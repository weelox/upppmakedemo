<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UppMAKE Content Editor</title>
    <style>
      :root {
        --bg: #0a0b0d;
        --surface: #111419;
        --line: rgba(255, 255, 255, 0.14);
        --text: #f2f5fb;
        --muted: #aab4c6;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .bar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: grid;
        gap: 0.8rem;
        padding: 0.85rem 1rem;
        border-bottom: 1px solid var(--line);
        background: rgba(10, 11, 13, 0.92);
        backdrop-filter: blur(8px);
      }

      .bar-top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.55rem;
      }

      .bar h1 {
        margin: 0;
        font-size: 0.95rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .btn {
        border: 1px solid var(--line);
        background: #171b23;
        color: #fff;
        padding: 0.55rem 0.72rem;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        cursor: pointer;
      }

      .btn:hover {
        background: #202633;
      }

      .btn.primary {
        background: #fff;
        color: #111;
        border-color: #fff;
      }

      .btn.primary:hover {
        background: #e8edf7;
      }

      .status {
        margin-left: auto;
        color: var(--muted);
        font-size: 0.76rem;
        letter-spacing: 0.02em;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .stage {
        height: calc(100vh - 116px);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff;
      }

      @media (max-width: 760px) {
        .status {
          margin-left: 0;
          width: 100%;
        }

        .stage {
          height: calc(100vh - 168px);
        }
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <div class="bar-top">
        <h1>UppMAKE Content Editor</h1>
        <button class="btn" id="openBtn" type="button">Öppna HTML-fil</button>
        <button class="btn primary" id="saveBtn" type="button" disabled>Spara till fil</button>
        <button class="btn" id="downloadBtn" type="button" disabled>Ladda ner HTML</button>
        <span class="status" id="status">Ingen fil vald ännu.</span>
      </div>
      <p class="hint">
        Klicka direkt i texten i previewn och redigera live. Alla textfält i sidan är redigerbara.
      </p>
    </div>

    <div class="stage">
      <iframe id="preview" title="Live preview editor"></iframe>
    </div>

    <script>
      const preview = document.getElementById("preview");
      const openBtn = document.getElementById("openBtn");
      const saveBtn = document.getElementById("saveBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const statusEl = document.getElementById("status");

      let fileHandle = null;
      let dirty = false;
      let fileName = "index.html";

      const EDITABLE_SELECTOR = [
        "header a",
        "main h1",
        "main h2",
        "main h3",
        "main h4",
        "main h5",
        "main h6",
        "main p",
        "main li",
        "main summary",
        "main a",
        "main span",
        "footer span",
        "footer a",
      ].join(",");

      const setStatus = (text) => {
        statusEl.textContent = text;
      };

      const setDirty = (value) => {
        dirty = value;
        const tag = dirty ? " (osparade ändringar)" : "";
        setStatus(`${fileName}${tag}`);
      };

      const setEditorMode = () => {
        const doc = preview.contentDocument;
        if (!doc) return;

        const markerStyle = doc.createElement("style");
        markerStyle.id = "upm-editor-markers";
        markerStyle.textContent = `
          [data-upm-editable="true"] { outline: 1px dashed transparent; outline-offset: 2px; }
          [data-upm-editable="true"]:hover { outline-color: rgba(125, 240, 216, 0.65); }
          [data-upm-editable="true"]:focus { outline-color: #7df0d8; background: rgba(125, 240, 216, 0.08) !important; }
        `;
        doc.head.appendChild(markerStyle);

        doc.querySelectorAll(EDITABLE_SELECTOR).forEach((el) => {
          if (el.closest(".upm-logo-wrap")) return;
          if (el.classList.contains("arr")) return;
          if (el.classList.contains("num")) return;
          if (el.children.length > 0 && !el.matches("summary")) return;
          if (!el.textContent || !el.textContent.trim()) return;

          el.setAttribute("contenteditable", "true");
          el.setAttribute("data-upm-editable", "true");
          el.addEventListener("input", () => setDirty(true));
        });

        doc.addEventListener("click", (event) => {
          const anchor = event.target.closest("a");
          if (anchor) event.preventDefault();
        });
      };

      const loadHtml = (html) => {
        preview.srcdoc = html;
        preview.onload = () => {
          setEditorMode();
          downloadBtn.disabled = false;
          setDirty(false);
        };
      };

      const getCurrentHtml = () => {
        const doc = preview.contentDocument;
        if (!doc) return "";

        const clone = doc.documentElement.cloneNode(true);
        clone.querySelectorAll("[data-upm-editable]").forEach((el) => {
          el.removeAttribute("data-upm-editable");
          el.removeAttribute("contenteditable");
        });
        clone.querySelector("#upm-editor-markers")?.remove();
        return "<!doctype html>\n" + clone.outerHTML;
      };

      const saveToHandle = async () => {
        if (!fileHandle) return;
        const writable = await fileHandle.createWritable();
        await writable.write(getCurrentHtml());
        await writable.close();
        setDirty(false);
      };

      const downloadHtml = () => {
        const html = getCurrentHtml();
        const blob = new Blob([html], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = fileName || "index.html";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      };

      const openViaPicker = async () => {
        if (!window.showOpenFilePicker) {
          setStatus("Din browser saknar File System Access API. Använd Chrome/Edge.");
          return;
        }

        const [handle] = await window.showOpenFilePicker({
          multiple: false,
          types: [
            {
              description: "HTML-filer",
              accept: { "text/html": [".html", ".htm"] },
            },
          ],
          excludeAcceptAllOption: false,
        });

        fileHandle = handle;
        fileName = handle.name || "index.html";
        const file = await handle.getFile();
        const html = await file.text();
        saveBtn.disabled = false;
        loadHtml(html);
      };

      openBtn.addEventListener("click", () => {
        openViaPicker().catch((err) => {
          setStatus("Kunde inte öppna filen.");
          console.error(err);
        });
      });

      saveBtn.addEventListener("click", () => {
        saveToHandle().catch((err) => {
          setStatus("Kunde inte spara filen.");
          console.error(err);
        });
      });

      downloadBtn.addEventListener("click", downloadHtml);

      window.addEventListener("beforeunload", (event) => {
        if (!dirty) return;
        event.preventDefault();
        event.returnValue = "";
      });

      fetch("index.html")
        .then((response) => (response.ok ? response.text() : Promise.reject(new Error("no index"))))
        .then((html) => {
          fileName = "index.html";
          setStatus("index.html laddad i preview. Klicka Öppna HTML-fil för att kunna spara direkt.");
          loadHtml(html);
        })
        .catch(() => {
          setStatus("Klicka Öppna HTML-fil för att starta.");
        });
    </script>
  </body>
</html>
