<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sketch Challange</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-live="polite">
      <header class="topbar">
        <h1><span class="wordmark-primary">Sketch</span><span class="wordmark-secondary">Challange</span></h1>
        <div class="top-actions">
          <button id="themeToggle" class="btn btn-tertiary" type="button" aria-label="Byt tema">Mörkt tema</button>
          <button id="langToggle" class="btn btn-tertiary" type="button" aria-label="Byt språk">English</button>
        </div>
      </header>

      <section id="screen-start" class="screen" aria-label="Startskärm" aria-live="polite">
        <div class="start-actions">
          <button id="startBtn" class="btn btn-primary" type="button">Starta ny runda</button>
          <button id="settingsOpenBtn" class="btn btn-secondary" type="button">Inställningar</button>
        </div>
      </section>

      <section id="screen-play" class="screen" aria-label="Aktiv runda">
        <div class="timer-card">
          <span id="ui-timer-label" class="timer-label">Tid kvar</span>
          <div class="time-display" id="timeDisplay" aria-live="assertive" aria-atomic="true">02:00</div>
        </div>

        <div class="prompt-grid">
          <article class="prompt-card">
            <p id="prompt1" class="prompt-text"></p>
          </article>
          <article class="prompt-card">
            <p id="prompt2" class="prompt-text"></p>
          </article>
          <article class="prompt-card">
            <p id="prompt3" class="prompt-text"></p>
          </article>
        </div>

        <div class="play-actions">
          <button id="resetBtn" class="btn btn-secondary" type="button">Börja om</button>
        </div>
      </section>

      <section id="screen-finished" class="screen" aria-label="Rundan klar">
        <p id="ui-finished-message" class="finished-message">Tiden är ute!</p>
        <button id="restartBtn" class="btn btn-secondary" type="button">Börja om</button>
      </section>

      <section id="screen-settings" class="screen" aria-label="Inställningar">
        <h2 id="settings-title">Inställningar</h2>

        <div class="settings-block">
          <label id="settings-category-label" for="settingsCategorySelect">Kategori</label>
          <select id="settingsCategorySelect">
            <option value="category1">Kategori 1</option>
            <option value="category2">Kategori 2</option>
            <option value="category3">Kategori 3</option>
          </select>
          <p id="settings-category-count" class="settings-count" aria-live="polite"></p>
        </div>

        <div class="settings-block">
          <label id="manual-label" for="manualPromptInput">Lägg till prompt</label>
          <div class="prompt-add-row">
            <input id="manualPromptInput" type="text" maxlength="140" />
            <button id="manualAddBtn" class="btn btn-secondary" type="button">Lägg till</button>
          </div>
        </div>

        <div class="settings-block">
          <p id="settings-generate-title" class="settings-subtitle">Generera nya förslag</p>
          <button id="generatePromptsBtn" class="btn btn-secondary" type="button">Generera 10 nya prompts</button>
          <div id="generatedList" class="prompt-list prompt-gallery" aria-live="polite"></div>
          <button id="applyGeneratedBtn" class="btn btn-primary" type="button">Lägg till valda</button>
        </div>

        <div class="settings-block">
          <p id="settings-custom-title" class="settings-subtitle">Mina prompts i valda kategorin</p>
          <div id="customList" class="prompt-list"></div>
          <button id="deleteSelectedBtn" class="btn btn-secondary" type="button">Ta bort valda</button>
        </div>

        <div class="settings-block">
          <p id="settings-backup-title" class="settings-subtitle">Säkerhetskopiering</p>
          <div class="prompt-add-row">
            <button id="saveLocalBtn" class="btn btn-secondary" type="button">Spara på din enhet</button>
            <button id="saveAllBtn" class="btn btn-secondary" type="button">Spara för alla</button>
          </div>
          <textarea id="backupPayloadInput" class="backup-textarea" rows="4" placeholder="Din delningskod visas här" aria-label="Dela-kod"></textarea>
          <p id="backupStatus" class="backup-status"></p>
        </div>

        <div class="settings-block">
          <p id="settings-reset-title" class="settings-subtitle">Återställ prompts</p>
          <button id="resetPromptsBtn" class="btn btn-tertiary" type="button">Återställ till grundinställningar</button>
        </div>

        <button id="closeSettingsBtn" class="btn btn-primary" type="button">Tillbaka</button>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
